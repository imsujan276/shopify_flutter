name: example
description: A new Flutter project.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.0.3 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  shopify_flutter:
    path: ../
  # 6.2.0-beta is the first line whose Android package works with AGP 9 (the
  # stable 6.1.x pulls flutter_inappwebview_android 1.1.3, which calls
  # getDefaultProguardFile('proguard-android.txt') — removed in AGP 9). Move
  # back to a 6.x stable once one ships the AGP 9 fix.
  flutter_inappwebview: 6.2.0-beta.3
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.2
  flutter_widget_from_html: ^0.17.1
  alerter: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
